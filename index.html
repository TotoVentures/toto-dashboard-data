<body>
  <!-- Password gate -->
  <div id="loginGate" style="display:none;position:fixed;inset:0;z-index:9999;background:#0d1117;display:flex;align-items:center;justify-content:center;">
    <div style="text-align:center;font-family:system-ui;color:#fff;">
      <div style="margin-bottom:16px;">
        <img src="icon.png" width="64" height="64" style="border-radius:12px;">
      </div>
      <h2 style="margin:0 0 24px;font-weight:600;">Toto Dashboard</h2>
      <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password"
        style="padding:12px 16px;border-radius:8px;border:1px solid #333;background:#161b22;color:#fff;font-size:16px;width:240px;outline:none;">
      <div id="loginError" style="color:#f85149;margin-top:12px;font-size:14px;"></div>
    </div>
  </div>
  <script>
  (function(){
    const HASH = '256463c9d6174d762ae2da6c306582aa7229c7964e05b106f17a8ce8364e8f73';
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }
    const gate = document.getElementById('loginGate');
    if (localStorage.getItem('toto_auth') === HASH) {
      gate.style.display = 'none';
    } else {
      gate.style.display = 'flex';
      document.getElementById('loginPass').addEventListener('keydown', async function(e) {
        if (e.key === 'Enter') {
          const h = await sha256(this.value);
          if (h === HASH) {
            localStorage.setItem('toto_auth', HASH);
            gate.style.display = 'none';
          } else {
            document.getElementById('loginError').textContent = 'Wrong password';
          }
        }
      });
    }
  })();
  </script>

  <script>
    // Unregister old service workers and clear caches
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
      caches.keys().then(names => names.forEach(n => caches.delete(n)));
    }
  </script>
